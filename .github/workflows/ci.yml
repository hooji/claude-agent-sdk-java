name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Build and Test
        run: mvn clean verify
        env:
          # Live-conversation ITs run only when credentials are available; without
          # this secret they skip cleanly (unit tests and binary-level ITs still run).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
