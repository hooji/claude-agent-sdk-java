name: Tag Release

# Builds a GitHub Release (fat jar + sources jar) whenever a v* tag is pushed,
# or when dispatched with an existing tag (this is how the "Bump version and
# release" workflow kicks it off, since a tag pushed with the automatic
# GITHUB_TOKEN can't trigger the push event below).
# Independent of the Maven Central release (which is workflow_dispatch only).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v1.1.3)'
        required: true
        type: string

permissions:
  contents: write   # needed to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On a tag push this is the tag ref; on a dispatched run it's the
          # tag supplied as an input.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve tag and version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Building release ${TAG} (version ${TAG#v})"

      - name: Build SDK and fat jar
        # The release version comes entirely from the tag via the CI-friendly
        # -Drevision override; no POM mutation needed. flatten-maven-plugin
        # resolves ${revision} in the installed POMs.
        run: |
          ./mvnw -B -ntp -pl claude-code-sdk -am -DskipTests -Drevision=${{ steps.ver.outputs.version }} install
          (cd fatjar && ../mvnw -B -ntp -DskipTests -Drevision=${{ steps.ver.outputs.version }} package)

      - name: Stage release artifacts
        id: stage
        run: |
          V=${{ steps.ver.outputs.version }}
          mkdir -p release
          cp "fatjar/target/claude-code-sdk-all-${V}.jar" release/
          cp "fatjar/target/claude-code-sdk-all-${V}-sources.jar" release/
          ls -l release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V=${{ steps.ver.outputs.version }}
          TAG=${{ steps.ver.outputs.tag }}
          gh release create "${TAG}" \
            "release/claude-code-sdk-all-${V}.jar" \
            "release/claude-code-sdk-all-${V}-sources.jar" \
            --title "${TAG}" \
            --notes "Automated release ${TAG}.

          Assets:
          - \`claude-code-sdk-all-${V}.jar\` — fat jar (SDK + all runtime dependencies + NOP SLF4J binding).
          - \`claude-code-sdk-all-${V}-sources.jar\` — library sources (for IDE attachment)."
