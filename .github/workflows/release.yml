name: Tag Release

# Builds a GitHub Release (fat jar + sources jar) whenever a v* tag is pushed.
# Independent of the Maven Central release (which is workflow_dispatch only).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set Maven version to ${{ steps.ver.outputs.version }}
        run: |
          ./mvnw -B -ntp versions:set -DnewVersion=${{ steps.ver.outputs.version }} -DgenerateBackupPoms=false
          (cd fatjar && ../mvnw -B -ntp versions:set -DnewVersion=${{ steps.ver.outputs.version }} -DgenerateBackupPoms=false)

      - name: Build SDK and fat jar
        run: |
          ./mvnw -B -ntp -pl claude-code-sdk -am -DskipTests install
          (cd fatjar && ../mvnw -B -ntp -DskipTests package)

      - name: Stage release artifacts
        id: stage
        run: |
          V=${{ steps.ver.outputs.version }}
          mkdir -p release
          cp "fatjar/target/claude-code-sdk-all-${V}.jar" release/
          cp "fatjar/target/claude-code-sdk-all-${V}-sources.jar" release/
          ls -l release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V=${{ steps.ver.outputs.version }}
          gh release create "${GITHUB_REF_NAME}" \
            "release/claude-code-sdk-all-${V}.jar" \
            "release/claude-code-sdk-all-${V}-sources.jar" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release ${GITHUB_REF_NAME}.

          Assets:
          - \`claude-code-sdk-all-${V}.jar\` — fat jar (SDK + all runtime dependencies + NOP SLF4J binding).
          - \`claude-code-sdk-all-${V}-sources.jar\` — library sources (for IDE attachment)."
